<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Denier Submittal Builder Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-900 flex items-center justify-center min-h-screen font-['Montserrat']">
    <div class="max-w-md w-full bg-zinc-800 p-10 rounded-2xl shadow-2xl border border-zinc-700">
        <div class="text-center mb-8">
            <img src="/static/Denier logo.png" alt="Denier Logo" class="h-24 w-auto mx-auto mb-6 drop-shadow-lg">
            <h1 class="text-white text-xl font-black uppercase tracking-tight">Submittal Builder Login</h1>
        </div>

        <div id="updateBanner" class="hidden border rounded-xl px-4 py-3 mb-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="bannerIconContainer" class="w-12 h-8 rounded flex items-center justify-center bg-blue-500/20">
                    <span id="bannerIcon" class="text-[10px] font-bold text-white uppercase">UPG</span>
                </div>
                <div>
                    <h4 id="bannerText" class="text-white font-bold text-xs tracking-wide">Update Available: v<span id="updateVersion"></span></h4>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="startUpdate()" id="updateBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-1.5 px-4 rounded-lg text-[10px] uppercase tracking-widest shadow-lg transition-all">
                    Update Now
                </button>
                <button onclick="document.getElementById('updateBanner').classList.add('hidden')" class="text-white/50 hover:text-white px-2 text-lg">✕</button>
            </div>
        </div>

        {% if error %}
        <div class="mb-4 bg-red-900/40 border border-red-600 text-red-300 text-sm font-bold px-4 py-3 rounded-lg text-center uppercase tracking-wide">
            {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST" class="space-y-4">
            <input type="email" name="email" placeholder="Company Email" required
                   class="w-full bg-zinc-900 border border-zinc-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-[#008751] outline-none">
            <input type="password" name="password" placeholder="Password" required
                   class="w-full bg-zinc-900 border border-zinc-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-[#008751] outline-none">
            <button type="submit"
                    class="w-full bg-[#008751] text-white font-bold py-3 rounded-lg hover:bg-[#006e42] transition-all uppercase tracking-widest">
                Login
            </button>
        </form>

        <p class="text-center text-zinc-400 text-sm mt-6">
            Don't have an account?
            <a href="{{ url_for('register') }}" class="text-[#008751] font-bold hover:underline transition-all">
                Register here
            </a>
        </p>
    </div>

    <footer class="fixed bottom-4 right-4 text-zinc-600 text-[10px] uppercase font-bold tracking-widest opacity-50">
        v{{ version }}
    </footer>

    <script>
        async function checkUpdates() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const isManualSuccess = urlParams.get('updated') === 'true';
                
                if (sessionStorage.getItem('update_success') === 'true' || isManualSuccess) {
                    showSuccessBanner();
                    return; 
                }

                const res = await fetch('/check_updates');
                const data = await res.json();
                
                const banner = document.getElementById('updateBanner');
                if (data.just_updated) {
                    sessionStorage.setItem('update_success', 'true');
                    showSuccessBanner();
                } else if (data.available) {
                    document.getElementById('updateVersion').innerText = data.version;
                    banner.classList.remove('hidden');
                    banner.classList.add('bg-blue-900/40', 'border-blue-500/50');
                }
            } catch (e) {
                console.error("Update check failed", e);
            }
        }

        function showSuccessBanner() {
            const banner = document.getElementById('updateBanner');
            if (!banner) return;
            
            banner.classList.remove('hidden');
            banner.style.backgroundColor = 'rgba(20, 83, 45, 0.8)'; 
            banner.style.borderColor = 'rgba(34, 197, 94, 0.8)';
            
            const icon = document.getElementById('bannerIcon');
            if (icon) icon.innerText = "DONE";
            
            const iconContainer = document.getElementById('bannerIconContainer');
            if (iconContainer) {
                iconContainer.style.backgroundColor = 'rgba(34, 197, 94, 0.3)';
            }

            const text = document.getElementById('bannerText');
            if (text) text.innerText = "Update Installed Successfully!";
            
            const btn = document.getElementById('updateBtn');
            if (btn) btn.classList.add('hidden');
            
            setTimeout(() => {
                banner.classList.add('hidden');
                sessionStorage.removeItem('update_success');
            }, 5000);
        }

        async function startUpdate() {
            const btn = document.getElementById('updateBtn');
            btn.disabled = true;
            btn.innerText = "Starting...";
            try {
                const res = await fetch('/start_update', { method: 'POST' });
                const data = await res.json();
                if (data.status === 'success') {
                    btn.innerText = "Downloading...";
                    document.getElementById('bannerText').innerText = "Downloading Update...";
                } else {
                    alert("Error: " + data.message);
                    btn.disabled = false;
                    btn.innerText = "Update Now";
                }
            } catch (e) {
                btn.disabled = false;
            }
        }

        checkUpdates();
    </script>
</body>
</html>
