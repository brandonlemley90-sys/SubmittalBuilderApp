<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Denier Submittal Builder Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-900 flex items-center justify-center min-h-screen font-['Montserrat']">
    <div class="max-w-md w-full bg-zinc-800 p-10 rounded-2xl shadow-2xl border border-zinc-700">
        <div class="text-center mb-8">
            <img src="/static/Denier logo.png" alt="Denier Logo" class="h-24 w-auto mx-auto mb-6 drop-shadow-lg">
            <h1 class="text-white text-xl font-black uppercase tracking-tight">Reset Your Password</h1>
            <p class="text-zinc-500 text-xs mt-2 uppercase tracking-widest font-bold">Upload your .denierreset file below</p>
        </div>

        <div class="space-y-6">
            <div class="bg-zinc-900/60 rounded-xl border border-zinc-700 p-4">
                <p class="text-xs text-gray-400 leading-relaxed text-center">
                    If your admin sent you a <span class="text-[#008751] font-bold">.denierreset</span> file, upload it here to update your password.
                </p>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Password Reset File</label>
                <input type="file" id="resetFileInput" accept=".denierreset" 
                       class="w-full bg-zinc-900 border border-zinc-600 rounded-lg px-4 py-3 text-white text-sm focus:ring-2 focus:ring-[#008751] outline-none 
                              file:mr-4 file:py-1.5 file:px-4 file:rounded file:border-0 file:text-xs file:font-bold file:bg-[#008751] file:text-white 
                              hover:file:bg-[#006e42] file:cursor-pointer transition-all">
            </div>

            <p id="applyResetStatus" class="text-xs font-bold hidden text-center px-2 py-1 rounded-md"></p>

            <button type="button" onclick="applyResetFile()" 
                    class="w-full bg-[#008751] hover:bg-[#006e42] text-white font-black py-4 rounded-xl uppercase text-xs tracking-[0.2em] shadow-lg border border-[#00a865] transition-all">
                Apply Password Reset
            </button>

            <div class="text-center mt-6">
                <a href="/login" class="text-zinc-500 hover:text-white text-xs font-bold uppercase tracking-widest transition-colors flex items-center justify-center gap-2">
                    <span>←</span> Back to Login
                </a>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-4 left-0 right-0 text-center text-zinc-600 text-[10px] uppercase font-bold tracking-widest opacity-50">
        &copy; 2024 Brandon Lemley
    </footer>

    <script>
        async function applyResetFile() {
            const fileInput = document.getElementById('resetFileInput');
            const statusEl  = document.getElementById('applyResetStatus');

            if (!fileInput.files.length) {
                statusEl.textContent = '⚠️ Please select a .denierreset file first.';
                statusEl.className = 'text-xs font-bold text-yellow-400 block';
                statusEl.classList.remove('hidden');
                return;
            }

            let token;
            try {
                const text = await fileInput.files[0].text();
                token = JSON.parse(text);
            } catch {
                statusEl.textContent = '❌ Invalid file format.';
                statusEl.className = 'text-xs font-bold text-red-500 block';
                statusEl.classList.remove('hidden');
                return;
            }

            statusEl.textContent = 'Validating...';
            statusEl.className = 'text-xs font-bold text-blue-400 block';
            statusEl.classList.remove('hidden');

            try {
                const res = await fetch('/apply_reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    statusEl.textContent = '✅ ' + data.message;
                    statusEl.className = 'text-xs font-bold text-green-400 block';
                    fileInput.value = '';
                    setTimeout(() => { window.location.href = '/login'; }, 3000);
                } else {
                    statusEl.textContent = '❌ ' + (data.message || 'Reset failed.');
                    statusEl.className = 'text-xs font-bold text-red-500 block';
                }
            } catch (err) {
                statusEl.textContent = '❌ Server communication error.';
                statusEl.className = 'text-xs font-bold text-red-500 block';
            }
        }
    </script>
</body>
</html>
