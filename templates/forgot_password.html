<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Denier Submittal Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #050507; color: #f4f4f5; }
        .glass { background: rgba(12, 12, 14, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.15); }
        .gradient-text { background: linear-gradient(135deg, #00ffa0 0%, #00a86b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #00c87a 0%, #008751 100%); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0, 135, 81, 0.3); filter: brightness(1.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(ellipse_at_top_left,_var(--tw-gradient-stops))] from-zinc-900 via-black to-black">

    <div class="max-w-md w-full glass p-10 rounded-[2.5rem] shadow-2xl border border-white/5">

        <div class="text-center mb-10">
            <img src="/static/Denier logo.png" alt="Denier Logo" class="h-20 w-auto mx-auto mb-6 drop-shadow-[0_0_15px_rgba(34,197,94,0.3)]">
            <h1 class="text-2xl font-black uppercase tracking-tighter gradient-text">Reset Password</h1>
            <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-[0.4em] mt-2">Enter your email to receive a reset link</p>
        </div>

        {% if sent %}
        <div class="bg-[#008751]/10 border border-[#008751]/30 rounded-2xl p-6 text-center space-y-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mx-auto text-[#00e090]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <p class="text-[#00e090] font-black text-sm uppercase tracking-widest">Check Your Email</p>
            <p class="text-zinc-400 text-xs">If that address is registered, a reset link has been sent. It expires in 1 hour.</p>
        </div>
        <div class="mt-6 text-center">
            <a href="{{ url_for('login') }}" class="text-zinc-500 hover:text-zinc-300 text-[10px] font-bold uppercase tracking-widest transition-all">
                Back to Login
            </a>
        </div>

        {% else %}
        <form action="{{ url_for('forgot_password') }}" method="POST" class="space-y-5">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-2 ml-1">Email Address</label>
                <input type="email" name="email" placeholder="name@denier.com" required
                       class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-sm text-white focus:ring-2 focus:ring-[#00e090] outline-none transition-all placeholder:text-zinc-700">
            </div>
            <button type="submit" class="w-full btn-primary text-white font-black py-5 rounded-2xl uppercase tracking-[0.2em] shadow-2xl mt-2">
                Send Reset Link
            </button>
        </form>
        <div class="mt-8 text-center">
            <a href="{{ url_for('login') }}" class="text-zinc-500 hover:text-zinc-300 text-[10px] font-bold uppercase tracking-widest transition-all">
                Back to Login
            </a>
        </div>
        {% endif %}

    </div>
</body>
</html>
