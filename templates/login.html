<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Denier Submittal Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #050507; color: #f4f4f5; }
        .glass { background: rgba(12, 12, 14, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.15); }
        .gradient-text { background: linear-gradient(135deg, #00ffa0 0%, #00a86b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #00c87a 0%, #008751 100%); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0, 135, 81, 0.3); filter: brightness(1.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(ellipse_at_top_left,_var(--tw-gradient-stops))] from-zinc-900 via-black to-black font-['Outfit']">

    <div class="max-w-md w-full glass p-10 rounded-[2.5rem] shadow-2xl border border-white/5">
        <div class="text-center mb-10">
            <img src="/static/Denier logo.png" alt="Denier Logo" class="h-24 w-auto mx-auto mb-8 drop-shadow-[0_0_15px_rgba(34,197,94,0.3)]">
            <h1 class="text-2xl font-black uppercase tracking-tighter gradient-text">Submittal Builder</h1>
            <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-[0.4em] mt-2">Industrial Automation</p>
        </div>

        {% if error %}
        <div class="mb-6 bg-red-900/20 border border-red-500/30 text-red-400 text-[10px] font-black px-4 py-3 rounded-xl text-center uppercase tracking-widest">
            {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST" class="space-y-5">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-2 ml-1">Email Address</label>
                <input type="email" name="email" placeholder="name@denier.com" required
                       class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-sm text-white focus:ring-2 focus:ring-[#00e090] outline-none transition-all placeholder:text-zinc-700">
            </div>
            
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-2 ml-1">Password</label>
                <input type="password" name="password" placeholder="••••••••" required
                       class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-sm text-white focus:ring-2 focus:ring-[#00e090] outline-none transition-all placeholder:text-zinc-700">
            </div>

            <button type="submit"
                    class="w-full btn-primary text-white font-black py-5 rounded-2xl uppercase tracking-[0.2em] shadow-2xl mt-4">
                Enter Dashboard
            </button>
        </form>

        <div class="mt-10 pt-8 border-t border-white/5 text-center">
            <p class="text-xs text-zinc-500 font-medium">
                New to the platform?
                <a href="{{ url_for('register') }}" class="text-[#00e090] font-black hover:underline transition-all ml-1 uppercase text-[10px] tracking-widest">
                    Create Account
                </a>
            </p>
        </div>
    </div>

    <footer class="fixed bottom-6 text-zinc-500 text-[9px] font-black uppercase tracking-[0.5em] opacity-30">
        v2.1.0 · Render Production
    </footer>

</body>
</html>
