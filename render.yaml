services:
  - type: web
    name: submittal-builder-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: submittal-db
          property: connectionString
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: 3.11.6
    disk:
      name: submittal-data
      mountPath: /data
      sizeGB: 1

databases:
  - name: submittal-db
    plan: free
